# Application Name
spring.application.name=gym

# Import local properties (ignored by git) - optional, won't fail if missing
spring.config.import=optional:classpath:application-local.properties

# Server Configuration
server.port=${SERVER_PORT:8080}

# ======================================
# PostgreSQL Configuration
# ======================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gymdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:gymadmin}
spring.datasource.password=${DATABASE_PASSWORD:}

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ======================================
# H2 Configuration (Disabled)
# ======================================
spring.h2.console.enabled=false

# ======================================
# JPA / Hibernate Configuration
# ======================================
# Use 'create' on first run to create tables, then switch to 'update'
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Open session in view (disable for better performance in production)
spring.jpa.open-in-view=false

# ======================================
# Logging Configuration
# ======================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.gym=DEBUG

# ======================================
# Security Configuration
# ======================================
# JWT Configuration (to be used when implementing full JWT auth)
# jwt.secret=your-256-bit-secret-key-here-make-it-long-and-secure
# jwt.expiration=86400000

# ======================================
# API Documentation
# ======================================
