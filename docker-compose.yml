services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gymdb
      POSTGRES_USER: gymadmin
      POSTGRES_PASSWORD: gympass123
    ports:
      - "5432:5432"
    volumes:
      - gym_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymadmin -d gymdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gym_postgres_data:
    driver: local
